<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Joshua · Partner Onboarding</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  color-scheme: dark;
  --bg: #0a0a0a;
  --surface: #121212;
  --surface-2: #1a1a1a;
  --surface-3: #242424;
  --line: rgba(255,255,255,.09);
  --line-strong: rgba(255,255,255,.2);
  --text: #f5f5f0;
  --muted: #9b9b94;
  --dim: #62625c;
  --okx: #d8ff35;
  --okx-soft: rgba(216,255,53,.1);
  --red: #ff6860;
  --r: 14px;
  --r-sm: 10px;
  --ease: cubic-bezier(.22,.8,.24,1);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; min-height: 100%; background: var(--bg); }
body {
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  font-size: 15px;
  line-height: 1.45;
}
button, input { font: inherit; }
button { border: 0; color: inherit; cursor: pointer; background: none; padding: 0; }
.app {
  max-width: 520px;
  margin: 0 auto;
  padding: 10px 16px calc(96px + env(safe-area-inset-bottom));
  min-height: 100vh;
}

/* ── progress ── */
.progress { display: none; align-items: center; gap: 10px; padding: 6px 0 14px; }
.progress.on { display: flex; }
.progress .bar { flex: 1; height: 3px; border-radius: 2px; background: var(--surface-3); overflow: hidden; }
.progress .bar i { display: block; height: 100%; width: 0; background: var(--okx); border-radius: 2px; transition: width .35s var(--ease); }
.progress span { font-size: 12px; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }

/* ── screens ── */
.screen { display: none; animation: in .3s var(--ease); }
.screen.on { display: block; }
@keyframes in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* ── hook ── */
.hook-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 4px 0 18px; }
.hello { display: flex; align-items: center; gap: 10px; min-width: 0; }
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface-3) center/cover no-repeat;
  display: grid; place-items: center; font-weight: 800; font-size: 16px;
  border: 1px solid var(--line-strong); flex: none;
}
.brand-mark {
  width: 40px; height: 40px; border-radius: 50%; flex: none;
  background: var(--surface-3); border: 1px solid var(--line-strong);
  display: grid; place-items: center; color: #fff;
}
.brand-mark svg { width: 21px; height: 21px; }
.hello-copy b { display: block; font-size: 14px; letter-spacing: -.01em; }
.hello-copy span { display: block; font-size: 11.5px; color: var(--muted); margin-top: 1px; }
.lang { display: flex; gap: 2px; padding: 3px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface); flex: none; }
.lang button { padding: 0 11px; height: 34px; border-radius: 7px; font-size: 12px; font-weight: 700; color: var(--muted); white-space: nowrap; }
.lang button.active { background: var(--text); color: #000; }

.headline { padding: 6px 0 4px; }
.headline .kicker {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 11.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--okx); margin-bottom: 12px;
}
.kicker .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--okx); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
.headline h1 { margin: 0; font-size: 30px; line-height: 1.16; letter-spacing: -.03em; font-weight: 800; }
.headline h1 em { font-style: normal; color: var(--okx); }
.headline p { margin: 12px 0 0; color: var(--muted); font-size: 14.5px; }

.calc {
  margin-top: 22px; border: 1px solid var(--line); border-radius: var(--r);
  background: var(--surface); padding: 18px 16px 16px;
}
.calc-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
.calc-head b { font-size: 13px; font-weight: 700; }
.calc-head span { font-size: 11.5px; color: var(--dim); }
.calc-num { margin: 12px 0 2px; font-size: 34px; font-weight: 800; letter-spacing: -.03em; color: var(--okx); font-variant-numeric: tabular-nums; }
.calc-num small { font-size: 14px; color: var(--muted); font-weight: 600; letter-spacing: 0; }
.calc-sub { font-size: 12px; color: var(--muted); }
.calc-sub b { color: var(--text); }
input[type=range] {
  width: 100%; margin: 18px 0 6px; appearance: none; -webkit-appearance: none;
  height: 4px; border-radius: 2px; background: var(--surface-3); outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%;
  background: var(--okx); border: 3px solid #0a0a0a; box-shadow: 0 0 0 1px var(--okx), 0 4px 14px rgba(216,255,53,.3);
}
.calc-range { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); }
.calc-note { margin-top: 12px; font-size: 11px; color: var(--dim); line-height: 1.5; }

.proof { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
.proof div { border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--surface); padding: 12px 10px; text-align: center; }
.proof b { display: block; font-size: 17px; letter-spacing: -.02em; }
.proof span { display: block; margin-top: 3px; font-size: 10.5px; color: var(--muted); }

.hook-links { display: flex; gap: 8px; margin-top: 14px; }
.hook-links button {
  flex: 1; height: 42px; border: 1px solid var(--line); border-radius: var(--r-sm);
  background: var(--surface); color: var(--muted); font-size: 13px; font-weight: 600;
}
.host {
  display: flex; align-items: center; gap: 11px; margin-top: 14px;
  border: 1px solid var(--line); border-radius: var(--r); background: var(--surface); padding: 12px 14px;
}
.host img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex: none; }
.host b { display: block; font-size: 13.5px; }
.host span { display: block; font-size: 11.5px; color: var(--muted); margin-top: 1px; }

/* ── step screens ── */
.step-head { padding: 2px 0 16px; }
.step-head h2 { margin: 0; font-size: 23px; letter-spacing: -.02em; font-weight: 800; }
.step-head p { margin: 7px 0 0; color: var(--muted); font-size: 13.5px; }

.cards { display: grid; gap: 10px; }
.card {
  display: flex; align-items: center; gap: 14px; text-align: left;
  border: 1px solid var(--line); border-radius: var(--r); background: var(--surface);
  padding: 16px; transition: border-color .15s, background .15s, transform .1s;
}
.card:active { transform: scale(.985); }
.card.sel { border-color: var(--okx); background: var(--okx-soft); }
.card .ic {
  width: 42px; height: 42px; border-radius: 11px; background: var(--surface-3);
  display: grid; place-items: center; font-size: 19px; flex: none;
}
.card.sel .ic { background: var(--okx); }
.card .ic { color: var(--text); }
.card .ic svg { width: 22px; height: 22px; }
.card.sel .ic { color: #000; }
.card b { display: block; font-size: 15px; letter-spacing: -.01em; }
.card span { display: block; margin-top: 2px; font-size: 12px; color: var(--muted); }
.card .arr { margin-left: auto; color: var(--dim); font-size: 17px; flex: none; }

.field { margin-bottom: 14px; }
.field label { display: flex; justify-content: space-between; align-items: baseline; font-size: 12.5px; font-weight: 700; margin-bottom: 7px; }
.field label i { font-style: normal; font-size: 11px; color: var(--dim); font-weight: 500; }
.field input {
  width: 100%; height: 50px; padding: 0 14px;
  border: 1px solid var(--line); border-radius: var(--r-sm);
  background: var(--surface); color: var(--text); font-size: 15px;
  outline: none; transition: border-color .15s;
}
.field input:focus { border-color: var(--line-strong); }
.field input.bad { border-color: var(--red); }
.field .err { display: none; margin-top: 6px; font-size: 12px; color: var(--red); }
.field .err.on { display: block; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chips button {
  height: 40px; padding: 0 15px; border: 1px solid var(--line); border-radius: 999px;
  background: var(--surface); font-size: 13px; font-weight: 600; color: var(--muted);
  transition: all .15s;
}
.chips button.sel { background: var(--okx); border-color: var(--okx); color: #000; }
.live-est {
  display: flex; justify-content: space-between; align-items: center;
  border: 1px solid rgba(216,255,53,.25); border-radius: var(--r-sm);
  background: var(--okx-soft); padding: 12px 14px; margin-bottom: 16px;
}
.live-est span { font-size: 12px; color: var(--muted); }
.live-est b { font-size: 16px; color: var(--okx); font-variant-numeric: tabular-nums; }

/* ── review ── */
.review { border: 1px solid var(--line); border-radius: var(--r); background: var(--surface); overflow: hidden; }
.review .row {
  display: flex; justify-content: space-between; gap: 14px;
  padding: 13px 15px; border-bottom: 1px solid var(--line); font-size: 13.5px;
}
.review .row:last-child { border-bottom: 0; }
.review .row span { color: var(--muted); flex: none; }
.review .row b { font-weight: 600; text-align: right; word-break: break-all; }
.notice { margin-top: 14px; font-size: 11.5px; color: var(--dim); line-height: 1.55; padding: 0 2px; }
.notice b { color: var(--muted); }

/* ── success ── */
.success { text-align: center; padding: 48px 10px 20px; }
.success .mark {
  width: 76px; height: 76px; margin: 0 auto 22px; border-radius: 50%;
  background: var(--okx); color: #000; display: grid; place-items: center;
  font-size: 34px; font-weight: 800; animation: pop .5s var(--ease);
}
@keyframes pop { 0% { transform: scale(.4); opacity: 0; } 70% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
.success h2 { margin: 0; font-size: 24px; letter-spacing: -.02em; }
.success p { margin: 10px 0 0; color: var(--muted); font-size: 14px; }
.timeline { margin: 26px auto 0; max-width: 320px; text-align: left; }
.timeline .t {
  display: flex; gap: 12px; padding: 10px 0; font-size: 13px; color: var(--muted);
}
.timeline .t .n {
  width: 22px; height: 22px; border-radius: 50%; flex: none;
  border: 1px solid var(--line-strong); display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
}
.timeline .t.done .n { background: var(--okx); border-color: var(--okx); color: #000; }
.timeline .t.done { color: var(--text); }

/* ── sheet (rates / faq) ── */
.sheet-wrap { position: fixed; inset: 0; z-index: 50; display: none; }
.sheet-wrap.on { display: block; }
.sheet-bg { position: absolute; inset: 0; background: rgba(0,0,0,.6); animation: fade .2s; }
@keyframes fade { from { opacity: 0; } }
.sheet {
  position: absolute; left: 0; right: 0; bottom: 0; max-height: 82vh;
  border-radius: 18px 18px 0 0; background: var(--surface-2);
  padding: 10px 18px calc(24px + env(safe-area-inset-bottom));
  overflow-y: auto; animation: up .28s var(--ease);
}
@keyframes up { from { transform: translateY(40%); opacity: .4; } }
.sheet .grab { width: 38px; height: 4px; border-radius: 2px; background: var(--surface-3); margin: 4px auto 16px; }
.sheet h3 { margin: 0 0 14px; font-size: 18px; letter-spacing: -.02em; }
.sheet table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.sheet th { text-align: left; color: var(--dim); font-weight: 600; padding: 7px 6px; border-bottom: 1px solid var(--line); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
.sheet td { padding: 9px 6px; border-bottom: 1px solid var(--line); }
.sheet td.g { color: var(--okx); font-weight: 700; }
.faq-item { border-bottom: 1px solid var(--line); }
.faq-item button { width: 100%; display: flex; justify-content: space-between; gap: 10px; padding: 14px 2px; font-size: 14px; font-weight: 600; text-align: left; }
.faq-item button i { font-style: normal; color: var(--dim); transition: transform .2s; flex: none; }
.faq-item.open button i { transform: rotate(45deg); }
.faq-item .a { display: none; padding: 0 2px 14px; font-size: 13px; color: var(--muted); line-height: 1.6; }
.faq-item.open .a { display: block; }

/* fallback footer for non-telegram preview */
.fallback-cta {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: linear-gradient(transparent, var(--bg) 30%);
  display: none;
}
.fallback-cta.on { display: block; }
.fallback-cta button {
  width: 100%; max-width: 488px; margin: 0 auto; display: block;
  height: 52px; border-radius: var(--r-sm); background: var(--okx); color: #000;
  font-size: 15.5px; font-weight: 800; letter-spacing: -.01em;
}
.fallback-cta button:disabled { opacity: .5; }
.hidden { display: none !important; }
</style>
</head>

  <!-- S0 HOOK -->

      </div>
      <div class="lang" id="lang-switch">
        <button data-lang="ko">한국어</button><button data-lang="en">English</button><button data-lang="tw">繁體</button>
      </div>

    <div class="headline">

      <h1 id="h1"></h1>

  <!-- S1 TYPE -->

  api: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5l9-5.5 9 5.5"/><path d="M5.5 10.5v8M18.5 10.5v8M9.5 10.5v8M14.5 10.5v8"/><path d="M3.5 19.5h17"/></svg>'
};
const SCREENS = ["hook", "type", "channel", "contact", "review", "success"];
let screen = "hook";
let submitting = false;
const state = { type: "", data: {} };

const $ = id => document.getElementById(id);
const haptic = k => { try { ver("6.1") && tg.HapticFeedback.impactOccurred(k); } catch (_) {} };
const hapticSel = () => { try { ver("6.1") && tg.HapticFeedback.selectionChanged(); } catch (_) {} };
const hapticNote = k => { try { ver("6.1") && tg.HapticFeedback.notificationOccurred(k); } catch (_) {} };
const escapeHtml = s => String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));

/* ═══════════ rendering ═══════════ */
function renderStatic() {
  const c = t();
  $("hello-name").textContent = "Joshua";
  $("hello-sub").textContent = c.helloSub;
  $("kicker").textContent = c.kicker;
  $("h1").innerHTML = c.h1;
  $("h1-sub").textContent = c.h1Sub;
  $("proof-1").textContent = c.proof1;
  $("proof-2-num").textContent = c.proof2num;
  $("proof-2").textContent = c.proof2;
  $("proof-3").textContent = c.proof3;
  $("link-rates").textContent = c.linkRates;
  $("link-faq").textContent = c.linkFaq;
  $("host-sub").textContent = c.hostSub;
  $("type-h2").textContent = c.typeH2;
  $("type-p").textContent = c.typeP;
  $("ch-p").textContent = c.chP;
  $("ct-h2").textContent = c.ctH2;
  $("ct-p").textContent = c.ctP;
  $("rv-h2").textContent = c.rvH2;
  $("rv-p").textContent = c.rvP;
  $("compliance").innerHTML = c.compliance;
  $("ok-h2").textContent = c.okH2;
  $("ok-p").textContent = c.okP;
  $("tl-1").textContent = c.tl1; $("tl-2").textContent = c.tl2; $("tl-3").textContent = c.tl3;
  $("rates-h3").textContent = c.ratesH3;
  $("th-vol").textContent = c.thVol;
  $("th-traders").textContent = c.thTraders;
  $("rates-note").innerHTML = c.ratesNote;
  $("faq-h3").textContent = c.faqH3;
  $("faq-list").innerHTML = c.faq.map(([q, a], i) =>
    `<div class="faq-item" data-i="${i}"><button>${escapeHtml(q)}<i>＋</i></button><div class="a">${escapeHtml(a)}</div></div>`).join("");
  document.querySelectorAll("#lang-switch button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  $("type-cards").innerHTML = c.types.map(([key, ic, title, sub]) =>
    `<button class="card${state.type === key ? " sel" : ""}" data-type="${key}">
      <div class="ic">${TYPE_ICONS[key] || ""}</div><div><b>${escapeHtml(title)}</b><span>${escapeHtml(sub)}</span></div><div class="arr">›</div>
    </button>`).join("");
}

function fieldHtml(def) {
  const c = t();
  const [label, ph, hint] = c.f[def.k] || [def.k, "", ""];
  if (def.chips) {
    return `<div class="field" data-k="${def.k}">
      <label>${escapeHtml(label)}${hint ? `<i>${escapeHtml(hint)}</i>` : ""}</label>
      <div class="chips">${def.chips.map(ch =>
        `<button data-chip="${escapeHtml(ch)}"${state.data[def.k] === ch ? ' class="sel"' : ""}>${escapeHtml(ch)}</button>`).join("")}</div>
      <div class="err"></div>
    </div>`;
  }
  const im = def.num || def.uid ? ' inputmode="numeric"' : def.url ? ' inputmode="url" type="url" autocapitalize="off"' : ' autocapitalize="off"';
  return `<div class="field" data-k="${def.k}">
    <label>${escapeHtml(label)}${hint ? `<i>${escapeHtml(hint)}</i>` : ""}</label>
    <input${im} placeholder="${escapeHtml(ph)}" value="${escapeHtml(state.data[def.k] || "")}" enterkeyhint="next">
    <div class="err"></div>
  </div>`;
}

const URL_PLATFORM = [
  [/youtube\.com|youtu\.be/i, "YouTube"], [/x\.com|twitter\.com/i, "X / Twitter"],
  [/instagram\.com/i, "Instagram"], [/tiktok\.com/i, "TikTok"],
  [/t\.me|telegram/i, "Telegram"], [/twitch\.tv/i, "Twitch"],
  [/discord/i, "Discord"], [/cafe\.naver/i, "Naver Cafe"], [/band\.us/i, "Band"]
];

function renderFields(part) {
  const wrap = $(part === "channel" ? "channel-fields" : "contact-fields");
  const defs = SCHEMA[state.type]?.[part] || [];
  wrap.innerHTML = defs.map(fieldHtml).join("");

  defs.forEach(def => {
    const box = wrap.querySelector(`[data-k="${def.k}"]`);
    if (def.chips) {
      box.querySelectorAll("[data-chip]").forEach(btn => btn.addEventListener("click", () => {
        state.data[def.k] = btn.dataset.chip;
        if (def.k === "social_type") delete state.data._st_auto;
        box.querySelectorAll("[data-chip]").forEach(b => b.classList.toggle("sel", b === btn));
        clearErr(box); hapticSel(); saveDraft();
      }));
      return;
    }
    const input = box.querySelector("input");
    if (def.prefill === "tg" && !state.data[def.k] && tgUser.username) {
      input.value = "@" + tgUser.username;
      state.data[def.k] = input.value;
    }
    input.addEventListener("focus", () => {
      setTimeout(() => { try { input.scrollIntoView({ behavior: "smooth", block: "center" }); } catch (_) {} }, 250);
    });
    input.addEventListener("input", () => {
      state.data[def.k] = input.value.trim();
      clearErr(box); saveDraft();
      if (def.url) {
        const allowed = (SCHEMA[state.type]?.channel || []).find(d => d.k === "social_type")?.chips || [];
        const hit = URL_PLATFORM.find(([re]) => re.test(input.value));
        const detected = hit && allowed.includes(hit[1]) ? hit[1] : "";
        // 자동 설정된 값만 갱신/해제 — 사용자가 직접 고른 칩은 건드리지 않는다
        if (detected && (!state.data.social_type || state.data._st_auto)) {
          state.data.social_type = detected; state.data._st_auto = 1;
          const stBox = wrap.querySelector('[data-k="social_type"]');
          stBox?.querySelectorAll("[data-chip]").forEach(b => b.classList.toggle("sel", b.dataset.chip === detected));
          hapticSel();
        }
      }
    });
  });

  if (part === "channel") {
    $("ch-h2").textContent = t().chH2[state.type] || "";
  }
}

function clearErr(box) {
  box.querySelector("input")?.classList.remove("bad");
  const e = box.querySelector(".err"); if (e) { e.classList.remove("on"); e.textContent = ""; }
}

function validate(part) {
  const c = t();
  const defs = SCHEMA[state.type]?.[part] || [];
  let firstBad = null;
  defs.forEach(def => {
    const box = document.querySelector(`#${part === "channel" ? "channel-fields" : "contact-fields"} [data-k="${def.k}"]`);
    if (!box) return;
    const val = (state.data[def.k] || "").trim();
    let msg = "";
    if (def.req && !val) msg = c.err.required;
    else if (def.uid && val && !/^\d{6,}$/.test(val.replace(/\s/g, ""))) msg = c.err.uid;
    else if (def.num && !def.uid && val && !/\d/.test(val)) msg = c.err.num;
    else if (def.url && val && !/^https?:\/\/.+\..+/.test(val) && !/^@?[\w.]{2,}$/.test(val)) msg = c.err.url;
    if (msg) {
      box.querySelector("input")?.classList.add("bad");
      const e = box.querySelector(".err"); e.textContent = msg; e.classList.add("on");
      firstBad = firstBad || box;
    }
  });
  if (firstBad) { hapticNote("error"); firstBad.scrollIntoView({ behavior: "smooth", block: "center" }); return false; }
  return true;
}

function renderReview() {
  const c = t();
  const order = [...(SCHEMA[state.type]?.channel || []), ...(SCHEMA[state.type]?.contact || [])];
  const typeMeta = c.types.find(x => x[0] === state.type);
  const rows = [[c.typeH2, typeMeta ? typeMeta[2] : state.type]];
  order.forEach(def => {
    const v = state.data[def.k];
    if (v) rows.push([(c.f[def.k] || [def.k])[0], v]);
  });
  $("review-list").innerHTML = rows.map(([k, v]) =>
    `<div class="row"><span>${escapeHtml(k)}</span><b>${escapeHtml(v)}</b></div>`).join("");
}

/* ═══════════ navigation + Telegram chrome ═══════════ */
function mainBtn() { return tg?.MainButton; }
function setScreen(next) {
  screen = next;
  SCREENS.forEach(s => $("s-" + s).classList.toggle("on", s === screen));
  window.scrollTo({ top: 0 });

  const stepIdx = { type: 1, channel: 2, contact: 3, review: 4 }[screen];
  $("progress").classList.toggle("on", Boolean(stepIdx));
  if (stepIdx) {
    $("progress-fill").style.width = (stepIdx / 4 * 100) + "%";
    $("progress-label").textContent = stepIdx + "/4";
  }

  if (screen === "channel") renderFields("channel");
  if (screen === "contact") renderFields("contact");
  if (screen === "review") renderReview();

  // BackButton
  try {
    if (ver("6.1") && tg?.BackButton) {
      if (["type", "channel", "contact", "review"].includes(screen)) tg.BackButton.show();
      else tg.BackButton.hide();
    }
  } catch (_) {}

  // closing confirmation while mid-flow
  try {
    if (ver("6.2")) {
      if (["channel", "contact", "review"].includes(screen)) tg.enableClosingConfirmation();
      else tg.disableClosingConfirmation();
    }
  } catch (_) {}

  syncCta();
}

function ctaLabel() {
  const c = t().btn;
  if (submitting) return c.submitting;
  return { hook: c.start, channel: c.next, contact: c.review, review: c.submit, success: c.close }[screen] || c.next;
}
function ctaVisible() { return screen !== "type"; } // type screen advances by card tap

function syncCta() {
  const label = ctaLabel();
  const mb = mainBtn();
  if (inTg && mb) {
    $("fallback-cta").classList.remove("on");
    if (!ctaVisible()) { mb.hide(); return; }
    const p = { text: label, color: "#d8ff35", text_color: "#000000", is_active: !submitting, is_visible: true };
    if (ver("7.10") && screen === "hook") p.has_shine_effect = true;
    try { mb.setParams(p); } catch (_) { mb.setText(label); mb.show(); }
    if (submitting) { try { mb.showProgress(true); } catch (_) {} }
    else { try { mb.hideProgress(); } catch (_) {} }
  } else {
    $("fallback-cta").classList.toggle("on", ctaVisible());
    $("fallback-btn").textContent = label;
    $("fallback-btn").disabled = submitting;
  }
}

function closeApp() {
  // 어떤 클라이언트/런치 경로에서든 닫히도록 다중 시도. 그래도 살아 있으면 훅으로 복귀.
  try { tg?.close(); } catch (_) {}
  try { window.Telegram?.WebApp?.close(); } catch (_) {}
  setTimeout(() => {
    try { window.close(); } catch (_) {}
    setScreen("hook");
  }, 400);
}

function advance() {
  if (submitting) return;
  haptic("light");
  if (screen === "hook") setScreen("type");
  else if (screen === "channel") { if (validate("channel")) setScreen("contact"); }
  else if (screen === "contact") { if (validate("contact")) setScreen("review"); }
  else if (screen === "review") submit();
  else if (screen === "success") closeApp();
}
function goBack() {
  if (submitting) return;
  haptic("light");
  if (screen === "review") setScreen("contact");
  else if (screen === "contact") setScreen("channel");
  else if (screen === "channel") setScreen("type");
  else if (screen === "type") setScreen("hook");
}

/* ═══════════ submit (sendData → bot, 계약 유지) ═══════════ */
function submit() {
  if (submitting) return;
  submitting = true;
  syncCta();
  const payload = {
    action: "partner_apply",
    type: state.type,
    lang,
    ...state.data,
    route: routeOf[state.type] || "affiliate",
    tg_id: tgUser.id || "",
    tg_user: tgUser.username || ""
  };
  hapticNote("success");
  try { if (ver("6.2")) tg.disableClosingConfirmation(); } catch (_) {}
  setTimeout(() => {
    if (inTg) {
      clearDraft();
      try { tg.sendData(JSON.stringify(payload)); } catch (_) {}
      // sendData는 키보드 버튼 런치에서만 동작하며 성공 시 앱을 즉시 닫는다.
      // 900ms 후에도 살아 있으면 인라인/메뉴 런치라 전송이 안 된 것 — 안내로 전환.
      setTimeout(() => { submitting = false; setScreen("success"); markNotDelivered(); }, 900);
      return;
    }
    submitting = false;
    setScreen("success");
    markNotDelivered();
  }, 250);
}

function markNotDelivered() {
  // 인라인/메뉴 버튼으로 열린 경우 sendData가 무시됨 — 키보드 버튼으로 재제출 안내.
  // 입력값은 CloudStorage 드래프트에 남아 있어 다시 열면 그대로 복원된다.
  const c = t();
  $("ok-h2").textContent = c.ndH2;
  $("ok-p").textContent = c.ndP;
  saveDraft();   // 전달 실패 — 키보드 버튼으로 다시 열 때 복원되도록 유지
  hapticNote("warning");
}

/* ═══════════ draft persistence (CloudStorage) ═══════════ */
let draftTimer = null;
function saveDraft() {
  if (!ver("6.9")) return;
  clearTimeout(draftTimer);
  draftTimer = setTimeout(() => {
    try { tg.CloudStorage.setItem("draft_v2", JSON.stringify({ type: state.type, data: state.data }), () => {}); } catch (_) {}
  }, 400);
}
function clearDraft() {
  clearTimeout(draftTimer);
  try { ver("6.9") && tg.CloudStorage.removeItem("draft_v2", () => {}); } catch (_) {}
}
function loadDraft(cb) {
  if (!ver("6.9")) return cb();
  try {
    tg.CloudStorage.getItem("draft_v2", (err, val) => {
      if (!err && val) {
        try {
          const d = JSON.parse(val);
          if (d && d.type && SCHEMA[d.type]) {
            state.type = d.type;
            const allow = new Set([...SCHEMA[d.type].channel, ...SCHEMA[d.type].contact].map(x => x.k));
            for (const [k, v] of Object.entries(d.data || {})) if (allow.has(k)) state.data[k] = v;
          }
        } catch (_) {}
      }
      cb();
    });
  } catch (_) { cb(); }
}

/* ═══════════ sheets ═══════════ */
function openSheet(id) { $(id).classList.add("on"); haptic("light"); }
function closeSheets() { document.querySelectorAll(".sheet-wrap").forEach(s => s.classList.remove("on")); }

/* ═══════════ wiring ═══════════ */
$("open-rates").addEventListener("click", () => openSheet("sheet-rates"));
$("open-faq").addEventListener("click", () => openSheet("sheet-faq"));
document.querySelectorAll("[data-close]").forEach(el => el.addEventListener("click", closeSheets));
$("faq-list").addEventListener("click", e => {
  const item = e.target.closest(".faq-item");
  if (item) { item.classList.toggle("open"); hapticSel(); }
});
$("type-cards").addEventListener("click", e => {
  const card = e.target.closest("[data-type]");
  if (!card) return;
  const prev = state.type;
  state.type = card.dataset.type;
  if (prev && prev !== state.type) state.data = {}; // 트랙 변경 시 답 초기화
  document.querySelectorAll("#type-cards .card").forEach(c => c.classList.toggle("sel", c === card));
  hapticSel(); saveDraft();
  setTimeout(() => setScreen("channel"), 160);
});
document.querySelectorAll("#lang-switch button").forEach(b => b.addEventListener("click", () => {
  lang = b.dataset.lang; hapticSel(); renderStatic(); syncCta();
}));
$("fallback-btn").addEventListener("click", advance);
try { tg?.MainButton?.onClick(advance); } catch (_) {}
try { tg?.BackButton?.onClick(goBack); } catch (_) {}
try { tg?.onEvent?.("themeChanged", () => {}); } catch (_) {}

/* ═══════════ boot ═══════════ */
renderStatic();
loadDraft(() => {
  renderStatic();
  if (params.get("tab") === "faq") openSheet("sheet-faq");   // 봇 '안내' 버튼 진입 유지
  if (params.get("tab") === "rates") openSheet("sheet-rates");
  syncCta();
});
</script>
